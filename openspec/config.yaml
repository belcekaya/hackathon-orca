schema: spec-driven

context:
  # Hackathon project using Agno agents with FastAPI
  # Python 3.12+, uv package manager, Hatchling build
  # Stack: Agno framework, FastAPI, Pydantic, httpx, loguru
  # Source layout: src/hackathon/ with agents/, api/, domain/, infrastructure/
  # Dev tools: ruff (linting), pytest + pytest-asyncio (testing)

rules:
  specs:
    - Use Python module paths when referencing source files (e.g., src/hackathon/agents/research_agent.py)
    - All agents use Agno framework conventions
    - API routes are in src/hackathon/api/routes/
  tasks:
    - Keep tasks scoped to 15-30 minutes of work
    - Prefer editing existing files over creating new ones
    - Test tasks should use pytest with async support
  design:
    - Favor simplicity — this is a hackathon
    - Use Agno's built-in patterns before inventing custom ones
    - Keep the FastAPI layer thin — business logic in domain/services
